name: Build GoogleMaps_HUD APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'GoogleMaps_HUD/**'
      - '.github/workflows/build-gmaps-hud-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: GoogleMaps_HUD
        run: ./gradlew :gmaps_hud:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmaps_hud-debug-apk
          path: GoogleMaps_HUD/gmaps_hud/build/outputs/apk/debug/*.apk
          if-no-files-found: error
